<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0c29;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
}

/* glowing container */

.container{
position:relative;
width:360px;
padding:40px;
background:#111;
border-radius:15px;
overflow:hidden;
}

/* animated border */

.container::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:linear-gradient(
0deg,
transparent,
#00ffff,
#00ffff
);
top:-50%;
left:-50%;
animation:animate 6s linear infinite;
}

.container::after{
content:"";
position:absolute;
inset:3px;
background:#111;
border-radius:12px;
}

/* form */

.form-box{
position:relative;
z-index:2;
text-align:center;
}

.form-box h2{
color:white;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#222;
color:white;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
background:#00ffff;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#00cccc;
}

/* link */

.switch{
margin-top:15px;
color:white;
}

.switch a{
color:#00ffff;
text-decoration:none;
}

@keyframes animate{
0%{
transform:rotate(0deg);
}
100%{
transform:rotate(360deg);
}
}

</style>

</head>

<body>

<div class="container">

<div class="form-box">

<h2>Login</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="switch">
Don't have account? <a href="signup.html">Signup</a>
</div>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>

</body>
</html>
