<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0e0f1a;
}

/* card */

.card{
position:relative;
width:340px;
padding:40px;
background:#16182c;
border-radius:20px;
overflow:hidden;
}

/* animated border */

.card::before{
content:"";
position:absolute;
width:500px;
height:500px;

background:linear-gradient(
45deg,
#ff0055,
#00eaff,
#ffea00,
#ff0055
);

animation:rotate 6s linear infinite;
}

.card::after{
content:"";
position:absolute;
inset:3px;
background:#16182c;
border-radius:18px;
}

/* form */

.form{
position:relative;
z-index:2;
text-align:center;
}

.form h2{
color:white;
margin-bottom:20px;
}

.form input{
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:25px;
background:#0e0f1a;
color:white;
outline:none;
}

.form button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#7ee7f9;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

/* link */

.link{
margin-top:15px;
}

.link a{
color:#ff2a6d;
text-decoration:none;
}

@keyframes rotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="card">

<div class="form">

<h2>LOGIN</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Sign In</button>

</form>

<div class="link">
<a href="signup.html">Create Account</a>
</div>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>

</body>
</html>
