<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login / Signup</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(45deg,#5f2c82,#49a09d);
}

.container{
width:360px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.form-box{
padding:30px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
border:none;
background:#6a11cb;
color:white;
border-radius:6px;
cursor:pointer;
}

.switch{
margin-top:15px;
font-size:14px;
}

.switch a{
color:#6a11cb;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="form-box">

<h2>Login</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="switch">
Don't have account? <a href="signup.html">Signup</a>
</div>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>

</body>
</html>
