<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Compress PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#0f172a;
color:white;
padding:30px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Compress PDF</h2>

<input type="file" id="file" accept="application/pdf">
<br><br>

<button onclick="compress()">Compress</button>

<script>

async function compress(){

alert("Browser PDF compression is limited.\nUse server for better compression.")

}

</script>

</body>
</html>
