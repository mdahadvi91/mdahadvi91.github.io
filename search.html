<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
}

.header{
padding:15px;
font-size:20px;
border-bottom:1px solid #333;
}

.searchBox{
padding:10px;
}

.searchBox input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#111;
color:white;
}

.results{
padding:10px;
}

.user{
padding:12px;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#ff0050;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
}

.menu{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:black;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #333;
}

</style>

</head>

<body>

<div class="header">Search Users</div>

<div class="searchBox">
<input id="search" placeholder="Search user..." onkeyup="findUser()">
</div>

<div class="results" id="results"></div>

<div class="menu">

<div onclick="location.href='home.html'">🏠<br>Home</div>

<div onclick="location.href='upload.html'">➕<br>Upload</div>

<div onclick="location.href='profile.html'">👤<br>Profile</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getAuth }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",
authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",
projectId: "hridoy-er-apps-2ad7c",
storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",
messagingSenderId: "152919903520",
appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

let users=[];

const results=document.getElementById("results");


async function loadUsers(){

const snap=await getDocs(collection(db,"users"));

snap.forEach(doc=>{

users.push(doc.data());

});

}

window.findUser=function(){

let text=document.getElementById("search").value.toLowerCase();

results.innerHTML="";

users.forEach(u=>{

if(u.email.toLowerCase().includes(text)){

results.innerHTML+=`

<div class="user">

<div onclick="location.href='profile.html?user=${u.email}'">

${u.email}

</div>

<button onclick="followUser('${u.email}')">

Follow

</button>

</div>

`;

}

});

}

loadUsers();

</script>

</body>

</html>
