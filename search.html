<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:black;
color:white;
padding:20px;
}

/* search bar */

.searchBox{
display:flex;
margin-bottom:20px;
}

.searchBox input{
flex:1;
padding:10px;
border:none;
border-radius:6px 0 0 6px;
outline:none;
}

.searchBox button{
padding:10px 15px;
border:none;
background:#ff0050;
color:white;
border-radius:0 6px 6px 0;
cursor:pointer;
}

/* results */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.grid video{
width:100%;
height:200px;
object-fit:cover;
border-radius:6px;
}

.back{
margin-top:20px;
text-align:center;
cursor:pointer;
color:#aaa;
}

</style>

</head>

<body>

<h2>Search Videos</h2>

<div class="searchBox">

<input type="text" id="searchInput" placeholder="Search caption...">

<button onclick="search()">Search</button>

</div>

<div class="grid" id="results"></div>

<div class="back" onclick="goHome()">⬅ Back to Home</div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const results=document.getElementById("results");

async function search(){

const keyword=document.getElementById("searchInput").value.toLowerCase();

results.innerHTML="";

const snapshot=await getDocs(collection(db,"videos"));

snapshot.forEach((doc)=>{

const data=doc.data();

if(data.caption.toLowerCase().includes(keyword)){

const video=document.createElement("video");

video.src=data.url;
video.controls=true;

results.appendChild(video);

}

});

}

window.search=search;

window.goHome=()=>{

window.location.href="home.html";

}

</script>

</body>
</html>
