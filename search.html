<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
}

.header{
padding:15px;
border-bottom:1px solid #333;
}

.searchBox{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#111;
color:white;
}

.results{
padding:10px;
}

.user{
padding:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.menu{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:black;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #333;
}

.menu div{
font-size:12px;
text-align:center;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<input
class="searchBox"
id="search"
placeholder="Search user..."
oninput="searchUser()">

</div>

<div class="results" id="results"></div>

<div class="menu">

<div onclick="location.href='home.html'">🏠<br>Home</div>

<div onclick="location.href='search.html'">🔍<br>Search</div>

<div onclick="location.href='upload.html'">➕<br>Upload</div>

<div onclick="location.href='notifications.html'">🔔<br>Alerts</div>

<div onclick="location.href='profile.html'">👤<br>Profile</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",
authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",
projectId: "hridoy-er-apps-2ad7c",
storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",
messagingSenderId: "152919903520",
appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const results=document.getElementById("results");

window.searchUser = async function(){

let text=document.getElementById("search").value.toLowerCase();

results.innerHTML="";

const snap=await getDocs(collection(db,"users"));

snap.forEach(doc=>{

const u=doc.data();

if(u.username.toLowerCase().includes(text)){

results.innerHTML+=`

<div class="user"
onclick="location.href='profile.html?user=${u.username}'">

@${u.username}

</div>

`;

}

});

}

</script>

</body>

</html>
