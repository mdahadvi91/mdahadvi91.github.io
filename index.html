<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mini TikTok</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:black;
color:white;
overflow:hidden;
}

#video-feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

video{
width:100%;
height:100vh;
object-fit:cover;
scroll-snap-align:start;
}

/* right buttons */

.right-buttons{
position:fixed;
right:10px;
bottom:120px;
display:flex;
flex-direction:column;
gap:15px;
}

.right-buttons button{
width:50px;
height:50px;
border-radius:50%;
border:none;
background:rgba(0,0,0,0.6);
color:white;
font-size:20px;
}

/* upload */

#uploadBtn{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
width:65px;
height:65px;
border-radius:50%;
border:none;
background:#ff0050;
color:white;
font-size:35px;
}

/* like animation */

.heart{
position:fixed;
font-size:70px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
pointer-events:none;
animation:pop 0.8s ease;
}

@keyframes pop{
0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}
50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}
100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}

::-webkit-scrollbar{
display:none;
}

</style>
</head>

<body>

<div id="video-feed">

<video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted playsinline></video>

<video src="https://www.w3schools.com/html/movie.mp4" autoplay loop muted playsinline></video>

</div>

<div class="right-buttons">

<button id="likeBtn">❤️</button>
<button id="shareBtn">🔗</button>

</div>

<button id="uploadBtn">+</button>

<script>

const videos=document.querySelectorAll("video")

// tap → sound on

videos.forEach(video=>{

video.addEventListener("click",()=>{

videos.forEach(v=>v.muted=true)

video.muted=false
video.play()

})

})


// scroll play system

window.addEventListener("scroll",()=>{

videos.forEach(video=>{

const rect=video.getBoundingClientRect()

if(rect.top>=0 && rect.bottom<=window.innerHeight){

video.play()

}else{

video.pause()
video.muted=true

}

})

})


// double tap like animation

videos.forEach(video=>{

video.addEventListener("dblclick",()=>{

const heart=document.createElement("div")

heart.innerHTML="❤️"
heart.className="heart"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},800)

})

})


// like button

let likes=0

document.getElementById("likeBtn").onclick=function(){

likes++

this.innerText="❤️ "+likes

}


// share

document.getElementById("shareBtn").onclick=function(){

navigator.clipboard.writeText(window.location.href)

alert("Link Copied")

}

</script>

</body>
</html>
