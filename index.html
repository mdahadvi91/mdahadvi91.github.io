<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini TikTok</title>

<link rel="stylesheet" href="style.css">

<!-- Adsense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5168582564229195"
crossorigin="anonymous"></script>

</head>

<body>

<!-- VIDEO FEED -->
<div id="video-feed"></div>
  <div id="video-feed">
<video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay muted controls></video>
</div>

<!-- RIGHT SIDE BUTTONS -->
<div class="right-buttons">

<button id="profileBtn">👤</button>

<button id="likeBtn">❤️</button>
<div id="likeCount">0</div>

<button id="commentBtn">💬</button>

<button id="shareBtn">🔗</button>

<button id="followBtn">➕</button>

<button onclick="window.location.href='search.html'">🔍</button>

<button onclick="window.location.href='notifications.html'">🔔</button>

<button onclick="window.location.href='chat.html'">💬</button>

<button onclick="window.location.href='trending.html'">🔥</button>

<button onclick="window.location.href='dashboard.html'">📊</button>

</div>

<!-- COMMENT BOX -->
<div id="commentBox" class="comment-box"></div>

<!-- UPLOAD BUTTON -->
<button id="uploadBtn">+</button>

<!-- ADS BOX -->
<div class="ad-box">

<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-5168582564229195"
data-ad-slot="1234567890"
data-ad-format="auto"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

</div>

<!-- BUTTON ACTIONS -->
<script>

document.getElementById("profileBtn").onclick=function(){
window.location.href="profile.html";
}

document.getElementById("uploadBtn").onclick=function(){
window.location.href="upload.html";
}

document.getElementById("shareBtn").onclick=function(){
navigator.clipboard.writeText(window.location.href);
alert("Video link copied");
}

</script>

<!-- FIREBASE SCRIPTS -->

<script type="module" src="firebase.js"></script>
<script type="module" src="feed.js"></script>
<script type="module" src="like.js"></script>
<script type="module" src="comment.js"></script>
<script type="module" src="follow.js"></script>
<script type="module" src="premium.js"></script>
<script type="module" src="gift.js"></script>

</body>
</html>
