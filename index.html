/* YOUR ORIGINAL JS (unchanged) */

let tool=""
let files=[]

const gallery=document.getElementById("gallery")
const loader=document.getElementById("loader")
const bar=document.getElementById("progressBar")

function openTool(t){
tool=t
files=[]
gallery.innerHTML=""
document.getElementById("toolsPage").style.display="none"
document.getElementById("toolScreen").style.display="block"
history.pushState({tool:true},"")
}

function goHome(){

document.getElementById("infoPage").style.display="none"
document.getElementById("toolScreen").style.display="none"
document.getElementById("toolsPage").style.display="grid"

}

window.addEventListener("popstate",function(){
if(document.getElementById("toolScreen").style.display==="block"){goHome()}
})

document.getElementById("fileInput").addEventListener("change",e=>{
files=[...files,...e.target.files]
showPreview()
e.target.value=""
})

const dropArea=document.getElementById("dropArea")

dropArea.addEventListener("dragover",e=>e.preventDefault())

dropArea.addEventListener("drop",e=>{
e.preventDefault()
files=[...files,...e.dataTransfer.files]
showPreview()
})

function showPreview(){
gallery.innerHTML=""
files.forEach(file=>{
if(file.type.includes("image")){
const img=document.createElement("img")
img.src=URL.createObjectURL(file)
gallery.appendChild(img)
}
})
}

function startProgress(){
bar.style.width="0%"
let p=0
const i=setInterval(()=>{
p+=10
bar.style.width=p+"%"
if(p>=100) clearInterval(i)
},100)
}

function showLoader(){loader.style.display="block"}
function hideLoader(){loader.style.display="none"}

async function runTool(){
if(files.length===0){alert("Upload file first");return}
showLoader()
startProgress()
if(tool==="jpgpdf"||tool==="mergejpgpdf"){await mergeJpgToPdf()}
if(tool==="pdfjpg"){await pdfToJpg()}
if(tool==="jpgpng"){await jpgToPng()}
hideLoader()
}

async function mergeJpgToPdf(){

const pdfDoc=await PDFLib.PDFDocument.create()

for(const file of files){

const bytes=await file.arrayBuffer()

let image

if(file.type==="image/png"){image=await pdfDoc.embedPng(bytes)}
else{image=await pdfDoc.embedJpg(bytes)}

const page=pdfDoc.addPage([image.width,image.height])

page.drawImage(image,{x:0,y:0,width:image.width,height:image.height})

}

const pdfBytes=await pdfDoc.save()

download(URL.createObjectURL(new Blob([pdfBytes])),"images-to-pdf.pdf")

}

async function pdfToJpg(){

const file=files[0]

const reader=new FileReader()

reader.onload=async function(){

const typedarray=new Uint8Array(this.result)

const pdf=await pdfjsLib.getDocument(typedarray).promise

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)

const viewport=page.getViewport({scale:2})

const canvas=document.createElement("canvas")

const ctx=canvas.getContext("2d")

canvas.width=viewport.width
canvas.height=viewport.height

await page.render({canvasContext:ctx,viewport}).promise

download(canvas.toDataURL("image/jpeg"),"page-"+i+".jpg")

}

}

reader.readAsArrayBuffer(file)

}

function download(url,name){
const a=document.createElement("a")
a.href=url
a.download=name
a.click()
}
