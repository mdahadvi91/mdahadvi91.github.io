<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini TikTok</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="video-feed">

<video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted controls></video>

<video src="https://www.w3schools.com/html/movie.mp4" autoplay loop muted controls></video>
  
  <video src="video.mp4" autoplay loop muted playsinline></video>

</div>

<div class="right-buttons">

<button id="likeBtn">❤️</button>

<button id="commentBtn">💬</button>

<button id="shareBtn">🔗</button>

</div>

<button id="uploadBtn">+</button>

<script src="app.js"></script>

</body>

</html>
