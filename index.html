<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini TikTok</title>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
overflow:hidden;
}

#video-feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video-box{
height:100vh;
position:relative;
scroll-snap-align:start;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* CENTER BUTTONS */

.controls{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:30px;
}

.controls button{
width:75px;
height:75px;
border-radius:50%;
border:none;
background:rgba(0,0,0,0.5);
color:white;
font-size:26px;
cursor:pointer;
}

/* RIGHT SIDE */

.right-buttons{
position:absolute;
right:10px;
bottom:120px;
display:flex;
flex-direction:column;
gap:18px;
text-align:center;
}

.right-buttons button{
width:55px;
height:55px;
border-radius:50%;
border:none;
background:rgba(0,0,0,0.5);
color:white;
font-size:22px;
cursor:pointer;
}

.count{
font-size:14px;
}

/* PROGRESS BAR */

.progress{
position:absolute;
bottom:0;
width:100%;
height:4px;
background:rgba(255,255,255,0.2);
}

.bar{
height:100%;
width:0%;
background:#ff0050;
}

/* HEART ANIMATION */

.heart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
color:#ff0050;
opacity:0;
pointer-events:none;
}

.show{
animation:pop 0.7s ease;
}

@keyframes pop{

0%{opacity:0; transform:translate(-50%,-50%) scale(0.5);}
50%{opacity:1; transform:translate(-50%,-50%) scale(1.3);}
100%{opacity:0; transform:translate(-50%,-50%) scale(1);}

}

::-webkit-scrollbar{
display:none;
}

</style>

</head>

<body>

<div id="video-feed">

<!-- VIDEO -->

<div class="video-box">

<video src="https://www.w3schools.com/html/mov_bbb.mp4" loop></video>

<div class="controls">

<button class="back">⟲5</button>
<button class="play">▶</button>
<button class="forward">5⟳</button>

</div>

<div class="right-buttons">

<button class="like">❤️</button>
<div class="count">0</div>

<button class="comment">💬</button>
<button class="share">🔗</button>

</div>

<div class="progress">
<div class="bar"></div>
</div>

<div class="heart">❤️</div>

</div>


<div class="video-box">

<video src="https://www.w3schools.com/html/movie.mp4" loop></video>

<div class="controls">

<button class="back">⟲5</button>
<button class="play">▶</button>
<button class="forward">5⟳</button>

</div>

<div class="right-buttons">

<button class="like">❤️</button>
<div class="count">0</div>

<button class="comment">💬</button>
<button class="share">🔗</button>

</div>

<div class="progress">
<div class="bar"></div>
</div>

<div class="heart">❤️</div>

</div>

</div>

<script>

const boxes=document.querySelectorAll(".video-box")

function autoPlay(){

boxes.forEach(box=>{

const video=box.querySelector("video")

const rect=box.getBoundingClientRect()

const middle=window.innerHeight/2

if(rect.top<=middle && rect.bottom>=middle){

video.play()
video.muted=false

}else{

video.pause()
video.muted=true

}

})

}

document.getElementById("video-feed").addEventListener("scroll",autoPlay)

autoPlay()


boxes.forEach(box=>{

const video=box.querySelector("video")

const play=box.querySelector(".play")
const back=box.querySelector(".back")
const forward=box.querySelector(".forward")

const likeBtn=box.querySelector(".like")
const likeCount=box.querySelector(".count")

const heart=box.querySelector(".heart")

const bar=box.querySelector(".bar")

let likes=0

play.onclick=()=>{

if(video.paused){

video.play()
play.innerText="⏸"

}else{

video.pause()
play.innerText="▶"

}

}

back.onclick=()=>{

video.currentTime-=5

}

forward.onclick=()=>{

video.currentTime+=5

}

likeBtn.onclick=()=>{

likes++
likeCount.innerText=likes

}

/* DOUBLE TAP LIKE */

let lastTap=0

video.addEventListener("click",()=>{

let now=new Date().getTime()

if(now-lastTap<300){

likes++
likeCount.innerText=likes

heart.classList.add("show")

setTimeout(()=>{
heart.classList.remove("show")
},700)

}

lastTap=now

})


/* PROGRESS BAR */

video.addEventListener("timeupdate",()=>{

let percent=(video.currentTime/video.duration)*100

bar.style.width=percent+"%"

})


})

</script>

</body>

</html>
