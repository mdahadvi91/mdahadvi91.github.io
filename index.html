<script>

let tool=""
let files=[]

const gallery=document.getElementById("gallery")
const loader=document.getElementById("loader")
const bar=document.getElementById("progressBar")

function openTool(t){

tool=t
files=[]
gallery.innerHTML=""

document.getElementById("toolsPage").style.display="none"
document.getElementById("toolScreen").style.display="block"

history.pushState({tool:true},"")

}

function goHome(){

document.getElementById("toolScreen").style.display="none"
document.getElementById("toolsPage").style.display="grid"

}

window.addEventListener("popstate",function(){

if(document.getElementById("toolScreen").style.display==="block"){
goHome()
}

})

document.getElementById("fileInput").addEventListener("change",e=>{
files=[...e.target.files]
showPreview()
})

const dropArea=document.getElementById("dropArea")

dropArea.addEventListener("dragover",e=>e.preventDefault())

dropArea.addEventListener("drop",e=>{
e.preventDefault()
files=[...e.dataTransfer.files]
showPreview()
})

function showPreview(){

gallery.innerHTML=""

files.forEach(file=>{

if(file.type.includes("image")){

const img=document.createElement("img")
img.src=URL.createObjectURL(file)
gallery.appendChild(img)

}

})

}

function startProgress(){

bar.style.width="0%"
let p=0

const i=setInterval(()=>{
p+=10
bar.style.width=p+"%"
if(p>=100) clearInterval(i)
},100)

}

function showLoader(){loader.style.display="block"}
function hideLoader(){loader.style.display="none"}

async function runTool(){

if(tool==="crop"){
await cropImage()
}

if(tool==="watermark"){
await addWatermark()
}

if(tool==="colorpicker"){
await colorPicker()
}

if(tool==="webptojpg"){
await webpToJpg()
}

if(tool==="jpgtowebp"){
await jpgToWebp()
}

if(files.length===0){
alert("Upload file first")
return
}

showLoader()
startProgress()

if(tool==="jpgpdf" || tool==="mergejpgpdf"){
await mergeJpgToPdf()
}

if(tool==="pdfjpg"){
await pdfToJpg()
}

hideLoader()

}

async function mergeJpgToPdf(){

const pdfDoc=await PDFLib.PDFDocument.create()

for(const file of files){

const bytes=await file.arrayBuffer()

let image

if(file.type==="image/png"){
image=await pdfDoc.embedPng(bytes)
}else{
image=await pdfDoc.embedJpg(bytes)
}

const page=pdfDoc.addPage([image.width,image.height])

page.drawImage(image,{
x:0,y:0,
width:image.width,
height:image.height
})

}

const pdfBytes=await pdfDoc.save()

download(
URL.createObjectURL(new Blob([pdfBytes])),
"images-to-pdf.pdf"
)

}

async function pdfToJpg(){

const file=files[0]

const reader=new FileReader()

reader.onload=async function(){

const typedarray=new Uint8Array(this.result)

const pdf=await pdfjsLib.getDocument(typedarray).promise

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)

const viewport=page.getViewport({scale:2})

const canvas=document.createElement("canvas")

const ctx=canvas.getContext("2d")

canvas.width=viewport.width
canvas.height=viewport.height

await page.render({canvasContext:ctx,viewport}).promise

download(canvas.toDataURL("image/jpeg"),"page-"+i+".jpg")

}

}

reader.readAsArrayBuffer(file)

}

function download(url,name){

const a=document.createElement("a")
a.href=url
a.download=name
a.click()

}

async function cropImage(){

const file=files[0]

const img=new Image()
img.src=URL.createObjectURL(file)

img.onload=function(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=400
canvas.height=300

ctx.drawImage(img,0,0,400,300)

download(canvas.toDataURL(),"crop.png")

}

}

async function addWatermark(){

const file=files[0]

const img=new Image()
img.src=URL.createObjectURL(file)

img.onload=function(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

ctx.font="50px Arial"
ctx.fillStyle="rgba(255,255,255,0.5)"
ctx.fillText("Hridoy Tools",50,80)

download(canvas.toDataURL(),"watermark.png")

}

}

async function colorPicker(){

const file=files[0]

const img=new Image()
img.src=URL.createObjectURL(file)

img.onload=function(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

document.getElementById("gallery").innerHTML=""
document.getElementById("gallery").appendChild(canvas)

ctx.drawImage(img,0,0)

canvas.onclick=function(e){

const pixel=ctx.getImageData(e.offsetX,e.offsetY,1,1).data

alert("RGB: "+pixel[0]+","+pixel[1]+","+pixel[2])

}

}

}

async function webpToJpg(){

const file=files[0]

const img=new Image()
img.src=URL.createObjectURL(file)

img.onload=function(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

download(canvas.toDataURL("image/jpeg"),"image.jpg")

}

}

async function jpgToWebp(){

const file=files[0]

const img=new Image()
img.src=URL.createObjectURL(file)

img.onload=function(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

download(canvas.toDataURL("image/webp"),"image.webp")

}

}

</script>
