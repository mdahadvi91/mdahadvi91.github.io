<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini TikTok</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

#video-feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video-box{
height:100vh;
position:relative;
scroll-snap-align:start;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.controls{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

display:flex;
gap:20px;

}

.controls button{

width:70px;
height:70px;

border-radius:50%;

border:none;

background:rgba(0,0,0,0.6);

color:white;

font-size:28px;

}

</style>

</head>

<body>

<div id="video-feed">

<div class="video-box">

<video src="https://www.w3schools.com/html/mov_bbb.mp4"></video>

<div class="controls">

<button class="back">↺5</button>
<button class="play">▶</button>
<button class="forward">↻5</button>

</div>

</div>


<div class="video-box">

<video src="https://www.w3schools.com/html/movie.mp4"></video>

<div class="controls">

<button class="back">↺5</button>
<button class="play">▶</button>
<button class="forward">↻5</button>

</div>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script src="player.js"></script>

</body>

</html>
