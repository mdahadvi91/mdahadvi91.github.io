<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini TikTok</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

#video-feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

video{
width:100%;
height:100vh;
object-fit:cover;
scroll-snap-align:start;
}

::-webkit-scrollbar{
display:none;
}
</style>
</head>

<body>

<div id="video-feed">

<video src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>

<video src="https://www.w3schools.com/html/movie.mp4" controls></video>

</div>

<script>

const feed = document.getElementById("video-feed");
const videos = document.querySelectorAll("#video-feed video");

function checkVideo(){

videos.forEach(video=>{

const rect = video.getBoundingClientRect();
const middle = window.innerHeight / 2;

if(rect.top <= middle && rect.bottom >= middle){

video.play();

}else{

video.pause();

}

});

}

feed.addEventListener("scroll", checkVideo);

checkVideo();

</script>

</body>
</html>
