<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini TikTok</title>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
overflow:hidden;
}

#video-feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video-box{
height:100vh;
position:relative;
scroll-snap-align:start;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* CENTER BUTTONS */

.controls{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

display:flex;
gap:30px;

}

.controls button{

width:80px;
height:80px;

border-radius:50%;

border:none;

background:rgba(0,0,0,0.45);

backdrop-filter:blur(8px);

color:white;

font-size:28px;

cursor:pointer;

transition:0.2s;

}

.controls button:active{

transform:scale(0.9);

}

/* RIGHT SIDE BUTTONS */

.right-buttons{

position:absolute;

right:12px;
bottom:120px;

display:flex;
flex-direction:column;

gap:20px;
text-align:center;

}

.right-buttons button{

width:55px;
height:55px;

border-radius:50%;

border:none;

background:rgba(0,0,0,0.45);

backdrop-filter:blur(8px);

color:white;
font-size:22px;

cursor:pointer;

}

.count{
font-size:14px;
color:white;
}

::-webkit-scrollbar{
display:none;
}

</style>

</head>

<body>

<div id="video-feed">

<!-- VIDEO 1 -->

<div class="video-box">

<video src="https://www.w3schools.com/html/mov_bbb.mp4" loop></video>

<div class="controls">

<button class="back">⟲5</button>

<button class="play">▶</button>

<button class="forward">5⟳</button>

</div>

<div class="right-buttons">

<button class="like">❤️</button>
<div class="count">0</div>

<button class="comment">💬</button>

<button class="share">🔗</button>

</div>

</div>


<!-- VIDEO 2 -->

<div class="video-box">

<video src="https://www.w3schools.com/html/movie.mp4" loop></video>

<div class="controls">

<button class="back">⟲5</button>

<button class="play">▶</button>

<button class="forward">5⟳</button>

</div>

<div class="right-buttons">

<button class="like">❤️</button>
<div class="count">0</div>

<button class="comment">💬</button>

<button class="share">🔗</button>

</div>

</div>

</div>


<script>

const boxes=document.querySelectorAll(".video-box")

function autoPlay(){

boxes.forEach(box=>{

const video=box.querySelector("video")

const rect=box.getBoundingClientRect()

const middle=window.innerHeight/2

if(rect.top<=middle && rect.bottom>=middle){

video.play()
video.muted=false

}else{

video.pause()
video.muted=true

}

})

}

document.getElementById("video-feed").addEventListener("scroll",autoPlay)

autoPlay()


boxes.forEach(box=>{

const video=box.querySelector("video")

const play=box.querySelector(".play")
const back=box.querySelector(".back")
const forward=box.querySelector(".forward")

const likeBtn=box.querySelector(".like")
const likeCount=box.querySelector(".count")

let likes=0

play.onclick=()=>{

if(video.paused){

video.play()
play.innerText="⏸"

}else{

video.pause()
play.innerText="▶"

}

}

back.onclick=()=>{

video.currentTime-=5

}

forward.onclick=()=>{

video.currentTime+=5

}

likeBtn.onclick=()=>{

likes++
likeCount.innerText=likes

}

box.querySelector(".share").onclick=()=>{

if(navigator.share){

navigator.share({
title:"Watch video",
url:location.href
})

}

}

})

</script>

</body>

</html>
