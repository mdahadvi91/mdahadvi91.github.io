<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini TikTok</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
overflow:hidden;
}

.page{
display:none;
height:100vh;
}

.active{
display:block;
}

/* FEED */

#video-feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video-box{
height:100vh;
position:relative;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* RIGHT BUTTONS */

.right-buttons{
position:absolute;
right:10px;
bottom:140px;
display:flex;
flex-direction:column;
gap:18px;
text-align:center;
}

.right-buttons button{
width:55px;
height:55px;
border-radius:50%;
border:none;
background:rgba(0,0,0,0.6);
color:white;
font-size:22px;
}

/* PROFILE */

.profile-header{
text-align:center;
padding:20px;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
}

#followBtn{
padding:8px 20px;
border:none;
border-radius:20px;
background:#ff0050;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.stats{
display:flex;
justify-content:center;
gap:40px;
margin-top:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
padding-bottom:80px;
}

.grid video{
width:100%;
height:140px;
object-fit:cover;
}

/* NAVBAR */

.navbar{
position:fixed;
bottom:0;
width:100%;
height:65px;
background:black;
border-top:1px solid #333;
display:flex;
justify-content:space-around;
align-items:center;
}

.navbar button{
background:none;
border:none;
color:white;
font-size:22px;
}

/* UPLOAD */

.upload-box{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100%;
gap:20px;
}

::-webkit-scrollbar{
display:none;
}

</style>

</head>

<body>

<!-- HOME -->

<div id="home" class="page active">
<div id="video-feed"></div>
</div>

<!-- UPLOAD -->

<div id="upload" class="page">

<div class="upload-box">

<h2>Upload Video</h2>

<input type="file" id="videoFile">

<button onclick="uploadVideo()">Upload</button>

</div>

</div>

<!-- PROFILE -->

<div id="profile" class="page">

<div class="profile-header">

<img src="https://i.pravatar.cc/120" class="avatar">

<h2>Hridoy</h2>

<button id="followBtn">Follow</button>

<div class="stats">

<div>
<h3 id="followers">0</h3>
<p>Followers</p>
</div>

<div>
<h3 id="following">0</h3>
<p>Following</p>
</div>

</div>

</div>

<div class="grid" id="profileVideos"></div>

</div>

<!-- NAVBAR -->

<div class="navbar">

<button onclick="showPage('home')">🏠</button>
<button onclick="showPage('upload')">➕</button>
<button onclick="showPage('profile')">👤</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, setDoc, deleteDoc, getDoc }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";


const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",

authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",

projectId: "hridoy-er-apps-2ad7c",

storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",

messagingSenderId: "152919903520",

appId: "1:152919903520:web:5726d95dceeab535961b45"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);



/* PAGE SWITCH */

window.showPage=function(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}



/* LOAD VIDEOS */

async function loadVideos(){

const feed=document.getElementById("video-feed")

feed.innerHTML=""

const snap=await getDocs(collection(db,"videos"))

snap.forEach(d=>{

const data=d.data()

const box=document.createElement("div")

box.className="video-box"

box.innerHTML=`

<video src="${data.url}" loop controls></video>

<div class="right-buttons">

<button onclick="likeVideo('${d.id}',this)">❤️</button>

<div>${data.likes||0}</div>

<button onclick="shareVideo()">🔗</button>

<div>👁 ${data.views||0}</div>

</div>

`

feed.appendChild(box)

})

}

loadVideos()



/* UPLOAD VIDEO */

window.uploadVideo=async function(){

const file=document.getElementById("videoFile").files[0]

if(!file){

alert("Select video")

return

}

const fileName=Date.now()+"_"+file.name

const storageRef=ref(storage,"videos/"+fileName)

await uploadBytes(storageRef,file)

const url=await getDownloadURL(storageRef)

await addDoc(collection(db,"videos"),{

url:url,

likes:0,

views:0,

time:Date.now()

})

alert("Video Uploaded ✅")

loadVideos()

}



/* LIKE */

window.likeVideo=async function(id,btn){

const likeText=btn.nextElementSibling

let count=parseInt(likeText.innerText)

count++

likeText.innerText=count

await updateDoc(doc(db,"videos",id),{

likes:count

})

}



/* SHARE */

window.shareVideo=function(){

navigator.clipboard.writeText(location.href)

alert("Link Copied")

}



/* FOLLOW SYSTEM */

const followBtn=document.getElementById("followBtn")

const currentUser="user1"

const profileUser="user2"

async function loadFollowStats(){

const followersRef=collection(db,"users",profileUser,"followers")

const followingRef=collection(db,"users",currentUser,"following")

const followersSnap=await getDocs(followersRef)

const followingSnap=await getDocs(followingRef)

document.getElementById("followers").innerText=followersSnap.size

document.getElementById("following").innerText=followingSnap.size

const followDoc=doc(db,"users",profileUser,"followers",currentUser)

const snap=await getDoc(followDoc)

followBtn.innerText=snap.exists()?"Following":"Follow"

}

loadFollowStats()

followBtn.onclick=async()=>{

const followDoc=doc(db,"users",profileUser,"followers",currentUser)

const followingDoc=doc(db,"users",currentUser,"following",profileUser)

const snap=await getDoc(followDoc)

if(snap.exists()){

await deleteDoc(followDoc)

await deleteDoc(followingDoc)

}else{

await setDoc(followDoc,{time:Date.now()})

await setDoc(followingDoc,{time:Date.now()})

}

loadFollowStats()

}

</script>

</body>

</html>
