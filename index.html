<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini TikTok</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- VIDEO FEED -->

<div id="video-feed"></div>


<!-- RIGHT SIDE BUTTONS -->

<div class="right-buttons">

<button id="profileBtn">👤</button>

<button id="likeBtn">❤️</button>

<button id="commentBtn">💬</button>

<button id="shareBtn">🔗</button>

<button id="followBtn">➕</button>

<button id="searchBtn">🔍</button>

<button id="notifyBtn">🔔</button>

<button id="chatBtn">💬</button>

<button id="trendBtn">🔥</button>

<button id="liveBtn">📡</button>

<button id="giftBtn">🎁</button>

<button id="musicBtn">🎵</button>

<button id="effectBtn">✨</button>

<button id="cameraBtn">📷</button>

<button id="dashboardBtn">📊</button>

<button id="earnBtn">💰</button>

</div>


<!-- LIKE COUNT -->

<div id="likeCount">0</div>


<!-- COMMENT BOX -->

<div id="commentBox" class="comment-box"></div>


<!-- UPLOAD BUTTON -->

<button id="uploadBtn">+</button>


<!-- BUTTON SCRIPT -->

<script>

document.getElementById("profileBtn").onclick=function(){
window.location.href="profile.html";
}

document.getElementById("uploadBtn").onclick=function(){
window.location.href="upload.html";
}

document.getElementById("searchBtn").onclick=function(){
window.location.href="search.html";
}

document.getElementById("notifyBtn").onclick=function(){
window.location.href="notifications.html";
}

document.getElementById("chatBtn").onclick=function(){
window.location.href="chat.html";
}

document.getElementById("trendBtn").onclick=function(){
window.location.href="trending.html";
}

document.getElementById("liveBtn").onclick=function(){
window.location.href="live.html";
}

document.getElementById("giftBtn").onclick=function(){
window.location.href="gift.html";
}

document.getElementById("dashboardBtn").onclick=function(){
window.location.href="dashboard.html";
}

document.getElementById("earnBtn").onclick=function(){
window.location.href="earnings.html";
}

document.getElementById("shareBtn").onclick=function(){

navigator.clipboard.writeText(window.location.href);

alert("Video link copied");

}

</script>


<!-- FIREBASE SYSTEM -->

<script type="module" src="firebase.js"></script>

<script type="module" src="feed.js"></script>

<script type="module" src="like.js"></script>

<script type="module" src="comment.js"></script>

<script type="module" src="follow.js"></script>
