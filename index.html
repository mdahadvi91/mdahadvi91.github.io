<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini TikTok</title>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
overflow:hidden;
color:white;
}

/* PAGES */

.page{
display:none;
height:100vh;
}

.active{
display:block;
}

/* VIDEO FEED */

#video-feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video-box{
height:100vh;
position:relative;
scroll-snap-align:start;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* CONTROLS */

.controls{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:25px;
}

.controls button{
width:70px;
height:70px;
border-radius:50%;
border:none;
background:rgba(0,0,0,0.5);
color:white;
font-size:24px;
cursor:pointer;
}

/* RIGHT BUTTONS */

.right-buttons{
position:absolute;
right:10px;
bottom:140px;
display:flex;
flex-direction:column;
gap:18px;
text-align:center;
}

.right-buttons button{
width:55px;
height:55px;
border-radius:50%;
border:none;
background:rgba(0,0,0,0.5);
color:white;
font-size:22px;
cursor:pointer;
}

.count{
font-size:14px;
}

/* PROFILE GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
padding-bottom:80px;
}

.grid video{
width:100%;
height:140px;
object-fit:cover;
}

/* UPLOAD PAGE */

.upload-box{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100%;
gap:20px;
}

.upload-box input{
color:white;
}

/* BOTTOM NAV */

.navbar{
position:fixed;
bottom:0;
width:100%;
height:65px;
background:black;
border-top:1px solid #333;
display:flex;
justify-content:space-around;
align-items:center;
}

.navbar button{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

::-webkit-scrollbar{
display:none;
}

</style>

</head>

<body>

<!-- HOME PAGE -->

<div id="home" class="page active">

<div id="video-feed">

<div class="video-box">

<video src="https://www.w3schools.com/html/mov_bbb.mp4" loop></video>

<div class="controls">

<button class="back">⟲5</button>
<button class="play">▶</button>
<button class="forward">5⟳</button>

</div>

<div class="right-buttons">

<button class="like">❤️</button>
<div class="count">0</div>

<button>💬</button>
<button>🔗</button>

</div>

</div>

</div>

</div>

<!-- UPLOAD PAGE -->

<div id="upload" class="page">

<div class="upload-box">

<h2>Upload Video</h2>

<input type="file" id="videoUpload" accept="video/*">

<button onclick="uploadVideo()">Upload</button>

</div>

</div>

<!-- PROFILE PAGE -->

<div id="profile" class="page">

<h2 style="text-align:center">My Videos</h2>

<div class="grid" id="profileVideos"></div>

</div>


<!-- NAVIGATION BAR -->

<div class="navbar">

<button onclick="showPage('home')">🏠</button>

<button onclick="showPage('upload')">➕</button>

<button onclick="showPage('profile')">👤</button>

</div>


<script>

const boxes=document.querySelectorAll(".video-box")

function autoPlay(){

boxes.forEach(box=>{

const video=box.querySelector("video")

const rect=box.getBoundingClientRect()

const middle=window.innerHeight/2

if(rect.top<=middle && rect.bottom>=middle){

video.play()
video.muted=false

}else{

video.pause()
video.muted=true

}

})

}

document.getElementById("video-feed").addEventListener("scroll",autoPlay)

autoPlay()


boxes.forEach(box=>{

const video=box.querySelector("video")

const play=box.querySelector(".play")
const back=box.querySelector(".back")
const forward=box.querySelector(".forward")

const likeBtn=box.querySelector(".like")
const likeCount=box.querySelector(".count")

let likes=0

play.onclick=()=>{

if(video.paused){

video.play()
play.innerText="⏸"

}else{

video.pause()
play.innerText="▶"

}

}

back.onclick=()=>{

video.currentTime-=5

}

forward.onclick=()=>{

video.currentTime+=5

}

likeBtn.onclick=()=>{

likes++
likeCount.innerText=likes

}

})


/* PAGE NAVIGATION */

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}


/* VIDEO UPLOAD */

function uploadVideo(){

const file=document.getElementById("videoUpload").files[0]

if(!file) return

const url=URL.createObjectURL(file)

const grid=document.getElementById("profileVideos")

const v=document.createElement("video")

v.src=url
v.controls=true

grid.appendChild(v)

}

</script>

</body>

</html>
