<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hridoy Tools</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

</head>

<body>

<div class="bg"></div>

<h1 class="title">Hridoy Tools</h1>

<!-- TOOLS GRID -->
<div id="toolsPage" class="grid">

<button onclick="openTool('resize')">Resize</button>
<button onclick="openTool('compress')">Compress</button>
<button onclick="openTool('crop')">Crop</button>
<button onclick="openTool('rotate')">Rotate</button>
<button onclick="openTool('flip')">Flip</button>

<button onclick="openTool('jpgpng')">JPG → PNG</button>
<button onclick="openTool('pngjpg')">PNG → JPG</button>

<button onclick="openTool('jpgpdf')">JPG → PDF</button>
<button onclick="openTool('pngpdf')">PNG → PDF</button>

<button onclick="openTool('mergepdf')">Merge PDF</button>
<button onclick="openTool('splitpdf')">Split PDF</button>

<button onclick="openTool('pdfjpg')">PDF → JPG</button>

<button onclick="openTool('gray')">Grayscale</button>
<button onclick="openTool('invert')">Invert</button>

<button onclick="openTool('qr')">QR Generator</button>

<button onclick="openTool('base64e')">Base64 Encode</button>
<button onclick="openTool('base64d')">Base64 Decode</button>

<button onclick="openTool('info')">Image Info</button>

<button onclick="openTool('preview')">Preview</button>

</div>


<!-- TOOL SCREEN -->
<div id="toolScreen" class="toolScreen" style="display:none;">

<button class="backBtn" onclick="goHome()">⬅ Back</button>

<div id="uploadBox" class="uploadBox">

<input type="file" id="fileInput" multiple>

<p>Drag & Drop Files<br>or Click to Upload</p>

</div>

<div id="previewArea"></div>

<div class="progress">
<div id="progressBar"></div>
</div>

<canvas id="canvas"></canvas>

</div>


<!-- IMAGE PREVIEW POPUP -->
<div id="previewPopup" class="popup">

<div class="popupContent">

<img id="previewImg">

<button onclick="closePreview()">Close</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
