<link rel="stylesheet" href="style.css">

<body>

<!-- VIDEO FEED -->
<div id="video-feed"></div>

<!-- RIGHT SIDE BUTTONS -->

<div class="right-buttons">

<button id="profileBtn">👤</button>

<button id="likeBtn">❤️</button>

<button id="shareBtn">🔗</button>

<button id="followBtn">➕</button>

<button id="searchBtn">🔍</button>

<button id="notificationBtn">🔔</button>

<button id="chatBtn">💬</button>

<button id="trendingBtn">🔥</button>

<button id="giftBtn">🎁</button>

<button id="cameraBtn">📷</button>

<button id="effectBtn">🎬</button>

<button id="earnBtn">💰</button>

</div>

<!-- LIKE COUNT -->
<div id="likeCount" style="position:fixed;right:20px;bottom:220px;color:white;font-size:14px;">0</div>

<!-- COMMENT BOX -->
<div id="commentBox" class="comment-box"></div>

<!-- UPLOAD BUTTON -->

<button id="uploadBtn">+</button>

<!-- NAVIGATION SCRIPT -->

<script>

if(profileBtn){
profileBtn.onclick=function(){

}
