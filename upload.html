<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Video</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
text-align:center;
}

.header{
padding:15px;
border-bottom:1px solid #333;
font-size:20px;
}

.box{
padding:20px;
}

input,textarea{
width:90%;
margin:10px 0;
padding:12px;
border:none;
border-radius:8px;
background:#111;
color:white;
}

button{
padding:12px 20px;
border:none;
background:#ff0050;
color:white;
border-radius:8px;
}

.menu{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:black;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #333;
}

</style>

</head>

<body>

<div class="header">Upload Video</div>

<div class="box">

<input id="url" placeholder="Video URL">

<textarea id="caption" placeholder="Write caption..."></textarea>

<button onclick="upload()">Post Video</button>

</div>

<div class="menu">

<div onclick="location.href='home.html'">🏠<br>Home</div>

<div onclick="location.href='search.html'">🔍<br>Search</div>

<div onclick="location.href='upload.html'">➕<br>Upload</div>

<div onclick="location.href='profile.html'">👤<br>Profile</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",
authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",
projectId: "hridoy-er-apps-2ad7c",
storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",
messagingSenderId: "152919903520",
appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

window.upload = async function(){

const user = auth.currentUser;

let url=document.getElementById("url").value;

let caption=document.getElementById("caption").value;

if(!url){

alert("Enter video URL");
return;

}

await addDoc(collection(db,"videos"),{

url:url,
caption:caption,
user:user.email,
time:Date.now()

});

alert("Video Posted");

location.href="home.html";

}

</script>

</body>

</html>
