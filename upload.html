<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Upload Video</title><link rel="stylesheet" href="style.css"></head><body><h2 style="text-align:center;margin-top:20px;">Upload Video</h2><!-- VIDEO FILE --><input type="file" id="videoFile" accept="video/*"><!-- VIDEO PREVIEW --><video id="preview" controls style="width:100%;margin-top:10px;"></video>

<!-- MUSIC SELECT --><select id="musicSelect"><option value="">No Music</option><option value="music/beat1.mp3">Beat 1</option>
<option value="music/beat2.mp3">Beat 2</option>
<option value="music/beat3.mp3">Beat 3</option></select><audio id="musicPreview" controls></audio>

<!-- EFFECT SELECT --><select id="effectSelect"><option value="none">No Effect</option>
<option value="grayscale(1)">Black & White</option>
<option value="sepia(1)">Vintage</option>
<option value="brightness(1.5)">Bright</option>
<option value="contrast(1.8)">Contrast</option></select><!-- TRIM CONTROLS --><label>Start</label>
<input type="range" id="startTrim" min="0" max="100">

<label>End</label>
<input type="range" id="endTrim" min="0" max="100">

<!-- CAMERA BUTTON --><button onclick="window.location.href='camera.html'">Open Camera

</button><!-- UPLOAD BUTTON --><button id="uploadBtn">Upload Video</button>

<!-- PROGRESS --><div id="progress" style="text-align:center;margin-top:10px;"></div><script type="module" src="firebase.js"></script><script type="module" src="upload.js"></script></body></html>
