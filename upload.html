<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Video</title>

<style>

body{
background:black;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
width:90%;
max-width:400px;
text-align:center;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
background:#ff0050;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Upload Video</h2>

<input type="file" id="video">

<textarea id="caption" placeholder="Write caption"></textarea>

<button onclick="upload()">Upload</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { getFirestore,collection,addDoc }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getStorage,ref,uploadBytes,getDownloadURL }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

import { getAuth }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",

authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",

projectId: "hridoy-er-apps-2ad7c",

storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",

messagingSenderId: "152919903520",

appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);

const auth = getAuth(app);

window.upload = async function(){

const file = document.getElementById("video").files[0];

const caption = document.getElementById("caption").value;

if(!file){

alert("Select video first");

return;

}

const storageRef = ref(storage,"videos/"+Date.now()+file.name);

await uploadBytes(storageRef,file);

const url = await getDownloadURL(storageRef);

await addDoc(collection(db,"posts"),{

video:url,
caption:caption,
likes:0,
username:auth.currentUser.email

});

alert("Video uploaded");

location.href="home.html";

}

</script>

</body>

</html>
