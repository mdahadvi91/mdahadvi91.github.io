<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Upload Video</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
font-family:sans-serif;
}

.container{
width:350px;
padding:30px;
background:#111;
border-radius:12px;
text-align:center;
box-shadow:0 0 20px #ff0050;
}

input{
width:100%;
margin:15px 0;
}

button{
width:100%;
padding:12px;
background:#ff0050;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Upload Video</h2>

<input type="file" id="videoFile" accept="video/*">

<button id="uploadBtn">Upload</button>

<p id="status"></p>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="upload.js"></script>

</body>

</html>
