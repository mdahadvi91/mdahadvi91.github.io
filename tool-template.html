<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tool Page</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
text-align:center;
}

.upload-area{
margin-top:80px;
}

.select-btn{
background:#e53935;
color:white;
border:none;
padding:18px 40px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px;
}

.card{
width:140px;
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:8px;
}

.convert{
position:fixed;
bottom:20px;
right:20px;
background:#e53935;
color:white;
border:none;
padding:16px 30px;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

.add-btn{
position:fixed;
bottom:100px;
right:20px;
background:#ff5252;
color:white;
border:none;
width:50px;
height:50px;
border-radius:50%;
font-size:24px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Upload Images</h2>

<div class="upload-area">

<button class="select-btn" onclick="fileInput.click()">
Select Images
</button>

<p style="color:gray">or drop images here</p>

<input type="file" id="fileInput" multiple hidden>

</div>

<div class="preview" id="preview"></div>

<button class="add-btn" onclick="fileInput.click()">+</button>

<button class="convert">
Convert
</button>

<script>

const input=document.getElementById("fileInput")
const preview=document.getElementById("preview")

input.addEventListener("change",function(){

Array.from(this.files).forEach(file=>{

const reader=new FileReader()

reader.onload=function(e){

const card=document.createElement("div")
card.className="card"

const img=document.createElement("img")
img.src=e.target.result

card.appendChild(img)

preview.appendChild(card)

}

reader.readAsDataURL(file)

})

})

</script>

</body>
</html>
