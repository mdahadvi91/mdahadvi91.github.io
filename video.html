<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Video</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
}

.video-container{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

video{
width:100%;
height:100vh;
object-fit:cover;
}

.actions{
position:absolute;
right:15px;
bottom:120px;
display:flex;
flex-direction:column;
gap:15px;
}

.actions button{
background:rgba(0,0,0,0.6);
color:white;
border:none;
padding:12px;
font-size:18px;
border-radius:50%;
cursor:pointer;
}

.comment-box{
position:absolute;
bottom:0;
width:100%;
background:#111;
padding:10px;
display:none;
}

.comment-box input{
width:80%;
padding:8px;
border:none;
border-radius:4px;
}

.comment-box button{
padding:8px;
background:#ff0050;
border:none;
color:white;
border-radius:4px;
}

</style>

</head>

<body>

<div class="video-container">

<video id="videoPlayer" controls autoplay loop></video>

<div class="actions">

<button id="likeBtn">❤️</button>

<button id="commentBtn">💬</button>

<button id="shareBtn">🔗</button>

<button id="followBtn">➕</button>

</div>

<div class="comment-box" id="commentBox">

<input type="text" id="commentInput" placeholder="Write comment">

<button id="sendComment">Send</button>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="like.js"></script>
<script type="module" src="comment.js"></script>
<script type="module" src="follow.js"></script>

</body>

</html>
