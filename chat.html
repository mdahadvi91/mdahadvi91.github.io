<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Chat</title><link rel="stylesheet" href="style.css"><style>

.chat-header{
text-align:center;
padding:15px;
border-bottom:1px solid #333;
}

#chatBox{
height:70vh;
overflow-y:auto;
padding:10px;
}

.message{
padding:8px;
margin:6px 0;
background:#222;
border-radius:5px;
}

.chat-input{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
}

.chat-input input{
flex:1;
padding:12px;
border:none;
}

.chat-input button{
padding:12px;
border:none;
background:#ff0050;
color:white;
}

</style></head><body><div class="chat-header">
Direct Messages
</div><div id="chatBox"></div><div class="chat-input"><input type="text" id="messageInput" placeholder="Type message..."><button id="sendBtn">Send</button>

</div><script type="module" src="firebase.js"></script><script type="module" src="chat.js"></script></body></html>
