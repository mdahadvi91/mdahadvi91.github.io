<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comments</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
}

.header{
padding:15px;
border-bottom:1px solid #333;
font-size:20px;
}

.list{
padding:10px;
}

.comment{
padding:10px;
border-bottom:1px solid #222;
font-size:14px;
}

.box{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:black;
border-top:1px solid #333;
}

.box input{
flex:1;
padding:12px;
border:none;
background:#111;
color:white;
}

.box button{
padding:12px;
border:none;
background:#ff0050;
color:white;
}

</style>

</head>

<body>

<div class="header">Comments</div>

<div class="list" id="list"></div>

<div class="box">

<input id="text" placeholder="Write comment...">

<button onclick="send()">Post</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getAuth }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",
authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",
projectId: "hridoy-er-apps-2ad7c",
storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",
messagingSenderId: "152919903520",
appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const params=new URLSearchParams(location.search);

const video=params.get("video");

const list=document.getElementById("list");

async function load(){

const q=query(
collection(db,"comments"),
where("video","==",video)
);

const snap=await getDocs(q);

list.innerHTML="";

snap.forEach(doc=>{

const c=doc.data();

list.innerHTML+=`

<div class="comment">

<strong>${c.user}</strong><br>

${c.text}

</div>

`;

});

}

window.send = async function(){

const user=auth.currentUser;

let text=document.getElementById("text").value;

if(!text)return;

await addDoc(collection(db,"comments"),{

video:video,
text:text,
user:user.email,
time:Date.now()

});

document.getElementById("text").value="";

load();

}

load();

</script>

</body>

</html>
