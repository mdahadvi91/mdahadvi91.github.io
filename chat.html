<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px;
border-bottom:1px solid #333;
font-size:18px;
text-align:center;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
margin:8px 0;
padding:8px 12px;
border-radius:8px;
max-width:70%;
}

.me{
background:#ff0050;
margin-left:auto;
}

.other{
background:#222;
}

.box{
display:flex;
border-top:1px solid #333;
}

.box input{
flex:1;
padding:12px;
border:none;
background:#111;
color:white;
}

.box button{
padding:12px;
border:none;
background:#ff0050;
color:white;
}

</style>

</head>

<body>

<div class="header" id="name">Chat</div>

<div class="messages" id="messages"></div>

<div class="box">

<input id="text" placeholder="Write message...">

<button onclick="send()">Send</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getAuth }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",
authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",
projectId: "hridoy-er-apps-2ad7c",
storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",
messagingSenderId: "152919903520",
appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const params=new URLSearchParams(location.search);

const to=params.get("user");

document.getElementById("name").innerText="Chat with "+to;

const box=document.getElementById("messages");

async function load(){

const user=auth.currentUser;

const q=query(
collection(db,"messages"),
where("room","==",user.email+"_"+to)
);

const snap=await getDocs(q);

box.innerHTML="";

snap.forEach(doc=>{

const m=doc.data();

box.innerHTML+=`

<div class="msg ${m.from==user.email?'me':'other'}">

${m.text}

</div>

`;

});

}

window.send = async function(){

const user=auth.currentUser;

let text=document.getElementById("text").value;

if(!text)return;

await addDoc(collection(db,"messages"),{

room:user.email+"_"+to,
from:user.email,
to:to,
text:text,
time:Date.now()

});

document.getElementById("text").value="";

load();

}

load();

</script>

</body>

</html>
