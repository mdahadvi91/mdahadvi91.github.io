<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login / Signup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(45deg,#141e30,#243b55);
}

.container{
width:350px;
padding:30px;
background:rgba(0,0,0,0.8);
border-radius:15px;
box-shadow:0 0 25px #ff0050;
color:white;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#ff0050;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff3366;
}

.switch{
margin-top:15px;
font-size:14px;
cursor:pointer;
color:#aaa;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title">Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="actionBtn">Login</button>

<div class="switch" id="switchMode">
Don't have account? Signup
</div>

</div>

<script type="module">

import { auth } from "./firebase.js";

import {
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let loginMode=true;

const title=document.getElementById("title");
const btn=document.getElementById("actionBtn");
const switchMode=document.getElementById("switchMode");

switchMode.onclick=()=>{

loginMode=!loginMode;

if(loginMode){

title.innerText="Login";
btn.innerText="Login";
switchMode.innerText="Don't have account? Signup";

}else{

title.innerText="Signup";
btn.innerText="Signup";
switchMode.innerText="Already have account? Login";

}

};

btn.onclick=()=>{

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(loginMode){

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
window.location.href="home.html";
})
.catch(e=>alert(e.message));

}else{

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
window.location.href="home.html";
})
.catch(e=>alert(e.message));

}

};

</script>

</body>
</html>
