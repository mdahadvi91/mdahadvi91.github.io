<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auth</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
}

/* glowing box */

.box{
position:relative;
width:360px;
padding:40px;
background:#111827;
border-radius:15px;
overflow:hidden;
}

.box::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:linear-gradient(0deg,transparent,#00ffff,#00ffff);
top:-50%;
left:-50%;
animation:rotate 6s linear infinite;
}

.box::after{
content:"";
position:absolute;
inset:4px;
background:#111827;
border-radius:12px;
}

@keyframes rotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* form */

.form{
position:relative;
z-index:2;
text-align:center;
}

h2{
color:white;
margin-bottom:25px;
}

/* floating input */

.inputBox{
position:relative;
margin:20px 0;
}

.inputBox input{
width:100%;
padding:12px;
border:none;
outline:none;
background:#1f2937;
color:white;
border-radius:6px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#00ffff;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.switch{
margin-top:15px;
color:#00ffff;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<div class="form">

<h2 id="title">Login</h2>

<form id="authForm">

<div class="inputBox">
<input type="email" id="email" placeholder="Email" required>
</div>

<div class="inputBox">
<input type="password" id="password" placeholder="Password" required>
</div>

<button type="submit" id="btn">Login</button>

</form>

<div class="switch" onclick="toggleForm()">
<span id="switchText">Create Account</span>
</div>

</div>

</div>

<script type="module">

import {auth} from "./firebase.js";

import {
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let mode="login";

window.toggleForm=function(){

if(mode==="login"){

mode="signup";

document.getElementById("title").innerText="Sign Up";
document.getElementById("btn").innerText="Create Account";
document.getElementById("switchText").innerText="Back to Login";

}else{

mode="login";

document.getElementById("title").innerText="Login";
document.getElementById("btn").innerText="Login";
document.getElementById("switchText").innerText="Create Account";

}

}

document.getElementById("authForm").addEventListener("submit",async(e)=>{

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

if(mode==="signup"){

await createUserWithEmailAndPassword(auth,email,password);
alert("Account created");

}else{

await signInWithEmailAndPassword(auth,email,password);
alert("Login success");
location.href="home.html";

}

}catch(err){

alert(err.message);

}

});

</script>

</body>
</html>
