<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login / Signup</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
font-family:sans-serif;
}

.container{
width:350px;
background:#111;
padding:30px;
border-radius:15px;
box-shadow:0 0 30px #00f2ff;
color:white;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
outline:none;
}

button{
width:100%;
padding:12px;
background:#ff0050;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.switch{
margin-top:15px;
font-size:14px;
cursor:pointer;
color:#00f2ff;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title">Login</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="actionBtn">Login</button>

<div class="switch" id="switchBtn">
Create new account
</div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>

</body>

</html>
