<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login / Signup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* card */

.container{
width:350px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

/* input */

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#6a11cb,#2575fc);
color:white;
font-weight:bold;
cursor:pointer;
}

/* switch link */

.switch{
margin-top:15px;
color:#555;
cursor:pointer;
}

.switch span{
color:#6a11cb;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title">Login</h2>

<form id="form">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit" id="btn">Login</button>

</form>

<div class="switch" onclick="toggleForm()">
<span id="switchText">Create new account</span>
</div>

</div>

<script type="module">

import {auth} from "./firebase.js";

import {
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let mode="login";

window.toggleForm=function(){

if(mode==="login"){

mode="signup";

document.getElementById("title").innerText="Sign Up";
document.getElementById("btn").innerText="Create Account";
document.getElementById("switchText").innerText="Already have account? Login";

}else{

mode="login";

document.getElementById("title").innerText="Login";
document.getElementById("btn").innerText="Login";
document.getElementById("switchText").innerText="Create new account";

}

}

document.getElementById("form").addEventListener("submit",async(e)=>{

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

if(mode==="signup"){

await createUserWithEmailAndPassword(auth,email,password);
alert("Account created");

}else{

await signInWithEmailAndPassword(auth,email,password);
alert("Login success");
location.href="home.html";

}

}catch(err){

alert(err.message);

}

});

</script>

</body>
</html>
