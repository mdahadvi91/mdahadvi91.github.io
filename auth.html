<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login / Signup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
}

/* glowing card */

.box{
position:relative;
width:350px;
height:420px;
background:#1e293b;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.box::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:linear-gradient(0deg,transparent,#00ffff,#00ffff);
animation:rotate 6s linear infinite;
}

.box::after{
content:'';
position:absolute;
inset:4px;
background:#1e293b;
border-radius:12px;
}

@keyframes rotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* form */

.form{
position:relative;
z-index:1;
width:280px;
text-align:center;
}

h2{
color:white;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#00ffff;
color:black;
font-weight:bold;
cursor:pointer;
}

.switch{
margin-top:15px;
color:#00ffff;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<div class="form">

<h2 id="title">Login</h2>

<form id="authForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit" id="btn">Login</button>

</form>

<div class="switch" onclick="toggleForm()">
<span id="switchText">Create Account</span>
</div>

</div>

</div>

<script type="module">

import {auth} from "./firebase.js";

import {
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let mode="login";

window.toggleForm=function(){

if(mode==="login"){

mode="signup";

document.getElementById("title").innerText="Sign Up";
document.getElementById("btn").innerText="Create Account";
document.getElementById("switchText").innerText="Back to Login";

}else{

mode="login";

document.getElementById("title").innerText="Login";
document.getElementById("btn").innerText="Login";
document.getElementById("switchText").innerText="Create Account";

}

}

document.getElementById("authForm").addEventListener("submit",async(e)=>{

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

if(mode==="signup"){

await createUserWithEmailAndPassword(auth,email,password);
alert("Account created");

}else{

await signInWithEmailAndPassword(auth,email,password);
alert("Login success");
location.href="home.html";

}

}catch(err){

alert(err.message);

}

});

</script>

</body>
</html>
