<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
}

.header{
text-align:center;
padding:20px;
border-bottom:1px solid #333;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
background:#333;
margin:auto;
}

.username{
margin-top:10px;
font-size:18px;
}

.stats{
display:flex;
justify-content:center;
gap:30px;
margin-top:10px;
font-size:14px;
}

.btns{
margin-top:10px;
}

button{
padding:8px 16px;
border:none;
background:#ff0050;
color:white;
border-radius:6px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:20px;
}

.grid video{
width:100%;
height:120px;
object-fit:cover;
}

.menu{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:black;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #333;
}

.menu div{
font-size:12px;
text-align:center;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div class="avatar"></div>

<div class="username" id="name">@user</div>

<div class="stats">

<div><span id="videos">0</span><br>Videos</div>
<div><span id="followers">0</span><br>Followers</div>
<div><span id="following">0</span><br>Following</div>

</div>

<div class="btns">

<button onclick="location.href='edit-profile.html'">Edit Profile</button>

</div>

</div>

<div class="grid" id="grid"></div>

<div class="menu">

<div onclick="location.href='home.html'">🏠<br>Home</div>

<div onclick="location.href='search.html'">🔍<br>Search</div>

<div onclick="location.href='upload.html'">➕<br>Upload</div>

<div onclick="location.href='notifications.html'">🔔<br>Alerts</div>

<div onclick="location.href='profile.html'">👤<br>Profile</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
where
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getAuth }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",
authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",
projectId: "hridoy-er-apps-2ad7c",
storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",
messagingSenderId: "152919903520",
appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const grid=document.getElementById("grid");

async function load(){

const user=auth.currentUser;

if(!user){

location.href="index.html";
return;

}

document.getElementById("name").innerText="@"+user.email;

const q=query(
collection(db,"videos"),
where("user","==",user.email)
);

const snap=await getDocs(q);

document.getElementById("videos").innerText=snap.size;

snap.forEach(doc=>{

const v=doc.data();

grid.innerHTML+=`

<video src="${v.url}" controls></video>

`;

});

}

load();

</script>

</body>

</html>
