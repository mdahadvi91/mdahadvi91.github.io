<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>

body{
font-family:sans-serif;
background:#0e0f1a;
color:white;
text-align:center;
}

textarea{
width:80%;
height:100px;
}

button{
padding:8px 15px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("role")!=="admin"){
window.location.href="index.html"
}

</script>

<h2>Admin Post Panel</h2>

<textarea id="text" placeholder="Write post"></textarea>

<br>

<input type="file" id="img">

<br>

<button onclick="post()">Upload Post</button>

<br>

<button onclick="logout()">Logout</button>

<script>

function post(){

let text=document.getElementById("text").value

let file=document.getElementById("img").files[0]

let reader=new FileReader()

reader.onload=function(){

let posts=JSON.parse(localStorage.getItem("posts"))||[]

posts.push({

text:text,
image:reader.result

})

localStorage.setItem("posts",JSON.stringify(posts))

alert("Post Uploaded")

}

if(file){
reader.readAsDataURL(file)
}

}

function logout(){
localStorage.clear()
window.location.href="index.html"
}

</script>

</body>
</html>
