<!DOCTYPE html><html>
<head>
<title>Admin Panel</title><style>
body{
background:#0e0f1a;
color:white;
font-family:sans-serif;
text-align:center;
padding:40px;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background:#00eaff;
border:none;
cursor:pointer;
}

.box{
margin-top:30px;
}
</style></head><body><h1>👑 Admin Panel</h1><div class="box"><h3>Upload Message</h3><input type="text" id="postText" placeholder="Write something"><br><button onclick="upload()">Upload</button>

</div><script>

function upload(){

let text=document.getElementById("postText").value;

localStorage.setItem("post",text);

alert("Upload Success!");

}

</script></body>
</html>
