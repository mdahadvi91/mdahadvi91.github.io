<!DOCTYPE html><html>
<head>
<title>Admin</title>
<style>
body{font-family:Arial;text-align:center}
textarea{width:300px;height:120px}
</style>
</head><body><script>

if(localStorage.getItem("role")!=="admin"){
location="index.html"
}

</script><h1>Admin Dashboard</h1><h3>Create Post</h3><textarea id="postText"></textarea><br><br>

<button onclick="addPost()">Upload Post</button>

<br><br>

<button onclick="logout()">Logout</button>

<script>

function addPost(){

let text=document.getElementById("postText").value

let posts=JSON.parse(localStorage.getItem("posts")) || []

posts.push(text)

localStorage.setItem("posts",JSON.stringify(posts))

alert("Post Uploaded")

}

function logout(){

localStorage.clear()
location="index.html"

}

</script></body>
</html>
