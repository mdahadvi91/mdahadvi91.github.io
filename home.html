<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Feed</title>

<link rel="stylesheet" href="tiktok-ui.css">

</head>

<body>

<div class="feed" id="feed"></div>

<div class="menu">

<div onclick="location.href='home.html'">🏠<br>Home</div>

<div onclick="location.href='search.html'">🔍<br>Search</div>

<div onclick="location.href='upload.html'">➕<br>Upload</div>

<div onclick="location.href='notifications.html'">🔔<br>Alerts</div>

<div onclick="location.href='profile.html'">👤<br>Profile</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",
authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",
projectId: "hridoy-er-apps-2ad7c",
storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",
messagingSenderId: "152919903520",
appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const feed=document.getElementById("feed");

async function loadVideos(){

const snap=await getDocs(collection(db,"videos"));

snap.forEach(doc=>{

const v=doc.data();

feed.innerHTML+=`

<div class="videoBox">

<video src="${v.url}" autoplay muted loop></video>

<div class="actions">

<button onclick="likeVideo('${v.url}','${v.user}')">❤️</button>

<button onclick="location.href='comment.html?video=${v.url}'">💬</button>

<button onclick="location.href='profile.html?user=${v.user}'">👤</button>

</div>

<div class="info">

<div class="username">@${v.user}</div>

<div class="caption">${v.caption || ""}</div>

</div>

</div>

`;

});

}

loadVideos();

</script>

<script src="like-system.js"></script>
<script src="follow-system.js"></script>
<script src="swipe-feed.js"></script>

</body>

</html>
