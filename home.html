<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Social App</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.videoBox{
height:100vh;
position:relative;
scroll-snap-align:start;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* RIGHT BUTTONS */

.right{
position:absolute;
right:10px;
bottom:120px;
color:white;
text-align:center;
}

.right div{
margin:15px 0;
font-size:20px;
}

/* CAPTION */

.caption{
position:absolute;
bottom:100px;
left:10px;
color:white;
max-width:70%;
}

/* TOP BAR */

.top{
position:absolute;
top:10px;
left:0;
right:0;
color:white;
text-align:center;
font-weight:bold;
font-size:18px;
}

/* BOTTOM MENU */

.menu{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:black;
display:flex;
justify-content:space-around;
align-items:center;
color:white;
border-top:1px solid #333;
}

.menu div{
text-align:center;
font-size:12px;
}

.plus{
background:white;
color:black;
font-size:25px;
width:40px;
height:40px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

</style>
</head>

<body>

<div class="feed" id="feed"></div>

<!-- BOTTOM MENU -->

<div class="menu">

<div>🏠<br>Home</div>

<div>👥<br>Friends</div>

<div class="plus">+</div>

<div>💬<br>Inbox</div>

<div>👤<br>Profile</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",

authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",

projectId: "hridoy-er-apps-2ad7c",

storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",

messagingSenderId: "152919903520",

appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const feed=document.getElementById("feed");

async function load(){

const snap=await getDocs(collection(db,"posts"));

snap.forEach(doc=>{

const d=doc.data();

feed.innerHTML+=`

<div class="videoBox">

<div class="top">Following | <b>For You</b></div>

<video autoplay loop muted src="${d.media}"></video>

<div class="right">

<div>❤️<br>${d.likes}</div>

<div>💬<br>0</div>

<div>🔗<br>Share</div>

</div>

<div class="caption">

<b>@${d.username}</b>

<p>${d.caption}</p>

</div>

</div>

`

})

}

load()

</script>

</body>
</html>
