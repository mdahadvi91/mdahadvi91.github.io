<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comments</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
}

.videoBox{
width:100%;
max-height:300px;
overflow:hidden;
}

video{
width:100%;
}

.commentList{
padding:15px;
height:55vh;
overflow:auto;
}

.comment{
padding:8px;
border-bottom:1px solid #333;
}

.comment b{
color:#ff0050;
}

.inputBox{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:black;
border-top:1px solid #333;
}

.inputBox input{
flex:1;
padding:12px;
border:none;
background:#111;
color:white;
}

.inputBox button{
padding:12px 20px;
border:none;
background:#ff0050;
color:white;
}

</style>

</head>

<body>

<div class="videoBox">

<video id="video" controls></video>

</div>

<div class="commentList" id="comments"></div>

<div class="inputBox">

<input id="text" placeholder="Write comment">

<button onclick="send()">Send</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { getFirestore,collection,addDoc,getDocs,query,where }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getAuth }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",

authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",

projectId: "hridoy-er-apps-2ad7c",

storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",

messagingSenderId: "152919903520",

appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const urlParams = new URLSearchParams(location.search);

const videoUrl = urlParams.get("video");

document.getElementById("video").src = videoUrl;

const commentsBox = document.getElementById("comments");

async function load(){

const q=query(collection(db,"comments"),where("video","==",videoUrl));

const snap=await getDocs(q);

snap.forEach(d=>{

const data=d.data();

commentsBox.innerHTML+=`

<div class="comment">

<b>${data.user}</b><br>

${data.text}

</div>

`;

});

}

window.send = async function(){

const text=document.getElementById("text").value;

const user=auth.currentUser;

if(!text) return;

await addDoc(collection(db,"comments"),{

video:videoUrl,
text:text,
user:user.email

});

document.getElementById("text").value="";

commentsBox.innerHTML="";

load();

}

load();

</script>

</body>

</html>
