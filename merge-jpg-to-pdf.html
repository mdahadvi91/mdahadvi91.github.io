<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Merge JPG to PDF - Hridoy Tools</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

.uploadBox{
border:2px dashed #38bdf8;
padding:40px;
text-align:center;
border-radius:10px;
cursor:pointer;
margin:20px;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:20px;
}

.preview img{
width:120px;
border-radius:8px;
}

.convertBtn{
display:block;
margin:20px auto;
padding:12px 30px;
background:#38bdf8;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<header>Merge JPG → PDF</header>

<div class="uploadBox" onclick="fileInput.click()">
<p>Select JPG Images</p>
<input type="file" id="fileInput" accept="image/jpeg" multiple hidden>
</div>

<div class="preview" id="preview"></div>

<button class="convertBtn" onclick="mergePDF()">Merge to PDF</button>

<script>

let images = [];

const input = document.getElementById("fileInput");
const preview = document.getElementById("preview");

input.addEventListener("change",function(){

preview.innerHTML="";
images=[];

Array.from(this.files).forEach(file=>{

const reader = new FileReader();

reader.onload=function(e){

images.push(e.target.result);

const img=document.createElement("img");
img.src=e.target.result;
preview.appendChild(img);

}

reader.readAsDataURL(file);

});

});

async function mergePDF(){

const { jsPDF } = window.jspdf;

const pdf = new jsPDF();

for(let i=0;i<images.length;i++){

if(i>0) pdf.addPage();

pdf.addImage(images[i],"JPEG",10,10,190,0);

}

pdf.save("merged.pdf");

}

</script>

</body>
</html>
