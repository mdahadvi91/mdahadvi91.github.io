<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
text-align:center;
}

.header{
padding:15px;
font-size:20px;
border-bottom:1px solid #333;
}

.box{
padding:20px;
}

input,textarea{
width:90%;
margin:10px 0;
padding:12px;
border:none;
border-radius:8px;
background:#111;
color:white;
}

button{
padding:12px 20px;
background:#ff0050;
border:none;
color:white;
border-radius:8px;
}

img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">Edit Profile</div>

<div class="box">

<img id="photo" src="https://via.placeholder.com/100">

<br>

<input type="text" id="username" placeholder="Username">

<textarea id="bio" placeholder="Your bio"></textarea>

<button onclick="save()">Save Profile</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyDAl3TMOxgMKvw-hjqmhEyNTUj2_I25bgk",
authDomain: "hridoy-er-apps-2ad7c.firebaseapp.com",
projectId: "hridoy-er-apps-2ad7c",
storageBucket: "hridoy-er-apps-2ad7c.firebasestorage.app",
messagingSenderId: "152919903520",
appId: "1:152919903520:web:5726d95dceeab535961b45"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);


const username=document.getElementById("username");

const bio=document.getElementById("bio");



async function load(){

const user=auth.currentUser;

if(!user){

location.href="login.html";
return;

}

const ref=doc(db,"users",user.email);

const snap=await getDoc(ref);

if(snap.exists()){

const data=snap.data();

username.value=data.username || "";

bio.value=data.bio || "";

}

}

window.save = async function(){

const user=auth.currentUser;

await setDoc(doc(db,"users",user.email),{

username:username.value,
bio:bio.value

});

alert("Profile Updated");

location.href="profile.html";

}

load();

</script>

</body>

</html>
